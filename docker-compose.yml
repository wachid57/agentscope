name: priva-agent

services:
  # ── AgentScope Python core (agent_server.py HTTP server) ────────────────────
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    image: priva-agent-core
    container_name: priva-agent-core
    restart: unless-stopped
    # Run the dynamic agent HTTP server (not just idle)
    command: python agent_server.py
    environment:
      # AgentScope core server port
      - AGENT_SERVER_PORT=5001
      - SESSION_DIR=/app/sessions
      # LLM API Keys — set in your .env file
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # priva-telegram integration (172.22.0.1 = docker host gateway from this network)
      - TELEGRAM_API_URL=${TELEGRAM_API_URL:-http://172.22.0.1:8080}
      - TELEGRAM_BOT_ID=${TELEGRAM_BOT_ID:-}
      - TELEGRAM_API_KEY=${TELEGRAM_API_KEY:-}
      # GWS integration
      - GWS_API_URL=${GWS_API_URL:-}
      - GWS_API_KEY=${GWS_API_KEY:-}
      - GWS_USER_ID=${GWS_USER_ID:-}
      - GWS_TENANT_ID=${GWS_TENANT_ID:-}
      # Tracing / observability (optional)
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      # Mount source for live code changes during development
      - ./core/src:/app/src
      - ./core/examples:/app/examples
      - ./core/agent_server.py:/app/agent_server.py
      # Persist sessions and data
      - priva-agent-data:/app/data
      - priva-agent-sessions:/app/sessions
    networks:
      - priva-agent-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: priva-agent-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-priva-agent}
      - POSTGRES_USER=${POSTGRES_USER:-priva-agent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-priva-agent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - priva-agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-priva-agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go/Fiber REST API backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: priva-agent-backend
    container_name: priva-agent-backend
    restart: unless-stopped
    ports:
      # Hanya expose ke host jika BACKEND_PORT_EXPOSE di-set di .env (default: jangan expose)
      - "${BACKEND_PORT_EXPOSE:-127.0.0.1:8088}:8080"
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      - AGENTSCOPE_URL=http://priva-agent-core:5001
      - DATABASE_URL=postgres://${POSTGRES_USER:-priva-agent}:${POSTGRES_PASSWORD:-priva-agent}@postgres:5432/${POSTGRES_DB:-priva-agent}?sslmode=disable
    volumes:
      - backend-data:/app/data
    networks:
      - priva-agent-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      core:
        condition: service_started

  # ── React frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: priva-agent-frontend
    container_name: priva-agent-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT_EXPOSE:-3030}:80"
    networks:
      - priva-agent-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - backend

  # Optional: Redis for memory backend
  redis:
    image: redis:7-alpine
    container_name: priva-agent-redis
    restart: unless-stopped
 #   ports:
 #     - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - priva-agent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Jaeger for OpenTelemetry tracing
  jaeger:
    profiles: ["debug"]
    image: jaegertracing/all-in-one:latest
    container_name: priva-agent-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - priva-agent-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  priva-agent-data:
  priva-agent-sessions:
  redis-data:
  backend-data:
  postgres-data:

networks:
  priva-agent-net:
    driver: bridge
