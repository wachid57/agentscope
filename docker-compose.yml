services:
  # ── AgentScope Python core (agent_server.py HTTP server) ────────────────────
  agentscope:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: agentscope-app
    restart: unless-stopped
    # Run the dynamic agent HTTP server (not just idle)
    command: python agent_server.py
    environment:
      # AgentScope core server port
      - AGENT_SERVER_PORT=5001
      - SESSION_DIR=/app/sessions
      # LLM API Keys — set in your .env file
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # Tracing / observability (optional)
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      # Mount source for live code changes during development
      - ./core/src:/app/src
      - ./core/examples:/app/examples
      - ./core/agent_server.py:/app/agent_server.py
      # Persist sessions and data
      - agentscope-data:/app/data
      - agentscope-sessions:/app/sessions
    networks:
      - agentscope-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── Go/Fiber REST API backend ────────────────────────────────────────────────
  agentscope-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentscope-backend
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      # URL of the Python agent_server.py (port 5001 inside Docker network)
      - AGENTSCOPE_URL=http://agentscope:5001
    volumes:
      - backend-data:/app/data
    networks:
      - agentscope-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      - agentscope

  # ── React frontend (Nginx) ───────────────────────────────────────────────────
  agentscope-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentscope-frontend
    restart: unless-stopped
    ports:
      - "3030:80"
    networks:
      - agentscope-net
    depends_on:
      - agentscope-backend

  # Optional: Redis for memory backend
  redis:
    image: redis:7-alpine
    container_name: agentscope-redis
    restart: unless-stopped
 #   ports:
 #     - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - agentscope-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Jaeger for OpenTelemetry tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: agentscope-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - agentscope-net

volumes:
  agentscope-data:
  agentscope-sessions:
  redis-data:
  backend-data:

networks:
  agentscope-net:
    driver: bridge
